stages:
  - test

run_python_tests:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .cache/pip
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements.txt
  script:
    - echo "Running unittests"
    - python -m unittest discover -s tests
  rules:
    - if: $CI_COMMIT_BRANCH

