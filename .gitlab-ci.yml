stages:
  - test
  - docker

run_python_tests:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  cache:
    key:
      files:
        - requirements.txt
    paths:
      - .cache/pip
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install -r requirements.txt
  script:
    - echo "Running unittests"
    - python -m unittest discover -s tests
  rules:
    - if: $CI_COMMIT_BRANCH

docker_build_and_run:
  stage: docker
  image: docker:24.0.7-cli
  services:
    - name: docker:24.0.7-dind
      command: ["--tls=false", "--mtu=1400"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    IMAGE_TAG: "hoewarmishetindelft-ci:$CI_COMMIT_SHORT_SHA"
  script:
    - |
      # function to run a container for a given target and capture its output
      run_target() {
        LABEL="$1"
        shift

        echo "Running container for ${LABEL}..."
        CONTAINER_ID=$(docker run --net=host -d -e PYTHONUNBUFFERED=1 "$IMAGE_TAG" "$@")
        echo "Container ID: ${CONTAINER_ID}"

        # wait for the container to finish
        EXIT_CODE=$(docker wait "${CONTAINER_ID}")

        # capture the logs (the temparature output)
        LOG_OUTPUT=$(docker logs "${CONTAINER_ID}" 2>&1)
        echo "**************************************************"
        printf '%s\n' "${LOG_OUTPUT}"
        echo "**************************************************"

        # remove the container
        docker rm "${CONTAINER_ID}" || true

        if [ "${EXIT_CODE}" -ne 0 ]; then
          echo "${LABEL} container failed with exit code ${EXIT_CODE}"
          exit "${EXIT_CODE}"
        fi
      }
      
      # build the docker image
      echo "Building image from dockerfile..."
      docker build -f Dockerfile -t "$IMAGE_TAG" .

      # run the container for each target
      run_target "Delft"
      run_target "Saratoga" --saratoga
  rules:
    - if: $CI_COMMIT_BRANCH
      exists:
        - Dockerfile